# docker-compose.yml
# -------------------------------------------------------------------
# Despliegue local y sencillo de Apache Kafka para Meteorisk.
#
# Usamos la imagen `bitnami/kafka`, que viene con KRaft activado
# (Kafka sin Zookeeper), lo cual mantiene el setup mínimo.
#
# Kafka quedará accesible desde el host en localhost:9092.
# Internamente (entre contenedores) escucha en kafka:9093.
#
# El tópico `weather_stream` se creará automáticamente al primer
# uso gracias a KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true.
# -------------------------------------------------------------------

services:
  kafka:
    image: apache/kafka:latest
    container_name: meteorisk-kafka
    ports:
      - "9092:9092"
    environment:
      # --- Modo KRaft (sin Zookeeper) ---
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # --- Listeners ---
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs

      # --- Creación automática del tópico `weather_stream` ---
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3

