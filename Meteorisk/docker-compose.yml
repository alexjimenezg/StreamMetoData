# docker-compose.yml
# -------------------------------------------------------------------
# Despliegue local y sencillo de Apache Kafka para Meteorisk.
#
# Usamos la imagen `bitnami/kafka`, que viene con KRaft activado
# (Kafka sin Zookeeper), lo cual mantiene el setup mínimo.
#
# Kafka quedará accesible desde el host en localhost:9092.
# Internamente (entre contenedores) escucha en kafka:9093.
#
# El tópico `weather_stream` se creará automáticamente al primer
# uso gracias a KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true.
# -------------------------------------------------------------------

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: meteorisk-kafka
    ports:
      - "9092:9092"
    environment:
      # --- Modo KRaft (sin Zookeeper) ---
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9094
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # --- Listeners ---
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9094,INTERNAL://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL

      # --- Creación automática del tópico `weather_stream` ---
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes

    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  kafka_data:
